[use]
# exec
plugin = @ezs/spawn
# JSONParse
plugin = @ezs/basics
# sentences
plugin = @ezs/strings

[JSONParse]

[sentences]
path = env('path', 'value')

[expand]
path = env('path', 'value')
size = 100

[expand/exec]
# command should be executable !
command = /app/public/v1/IRC3sp.mjs
args = fix('-t')
args = /app/public/v1/CoL.txt
args = fix('-c')

[dump]
indent = env('indent', false)
