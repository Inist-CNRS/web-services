# OpenAPI Documentation - JSON format (dot notation)
mimeType = application/json

post.responses.default.description = Return all objects with new data, i.e. species and subspecies names
post.responses.default.content.application/json.schema.$ref =  #/components/schemas/JSONStream
post.summary = Recherche des noms scientifiques d’espèces animales, végétales
post.requestBody.required = true
post.requestBody.content.application/json.schema.$ref = #/components/schemas/JSONStream
post.parameters.0.in = query
post.parameters.0.name = path
post.parameters.0.schema.type = string
post.parameters.0.description = The path in each object to enrich with a Perl script
post.parameters.1.in = query
post.parameters.1.name = indent
post.parameters.1.schema.type = boolean
post.parameters.1.description = Indent or not the JSON Result

post.requestBody.content.application/json.example.0.id = 1
post.requestBody.content.application/json.example.0.value = Trophic diversity accumulation curves of (a) Pseudopercis semifasciata, (b) Acanthistius patachonicus and (c) Pinguipes brasilianus. Horizontal lines show Brillouin diversity index (Hz) values (Hz± 0·05 Hz) and the vertical line shows a value n- 2 (n = number of stomachs).
post.requestBody.content.application/json.example.1.id = 2
post.requestBody.content.application/json.example.1.value = Phasianus colchicus/versicolor: in our study, the best match.
post.requestBody.content.application/json.example.2.id = 3
post.requestBody.content.application/json.example.2.value = short lower jaw in Etheostoma bellator Suttkus
post.requestBody.content.application/json.example.3.id = 4
post.requestBody.content.application/json.example.3.value = Pollen Viability for Air Pollution Bio-Monitoring>Abstract: Biological characterization of Corylus avellana L. and Pinus nigra L. pollen samples was carried out to determine the actual value of pollen as a bio-indicator of the effects of atmospheric pollution, using samples from plants naturally developed in sites controlled for air pollution. In Trentino (North Italy), we selected six stations at three different levels of air pollution, which are constantly monitored with automatic gauges by the Environmental Protection Agency of Trento. First results showed that pollen viability of both species, germinability and pollen tube length of P. nigra, were higher in areas with no road traffic compared to heavy traffic ones. Pollen viability of P. nigra was positively correlated to ozone (O3) concentrations and altitude but negatively to sulphur dioxide (SO2), particulate matter with a diameter less than 10 μ m (PM10), nitrogen oxides (NOx) and nitrogen dioxide (NO2) concentrations.
post.requestBody.content.application/json.example.4.id = 5
post.requestBody.content.application/json.example.4.value = Predicting the distribution of the air pollution sensitive lichen species Usnea hirta
post.requestBody.content.application/json.example.5.id = 6
post.requestBody.content.application/json.example.5.value = Samples of the lichen Xanthoria parietina were collected
