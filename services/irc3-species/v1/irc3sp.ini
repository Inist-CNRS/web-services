post.responses.default.content.application/json.example.3.id = 4
post.responses.default.content.application/json.example.3.value.0 = Corylus avellana
post.responses.default.content.application/json.example.3.value.1 = Pinus nigra
post.responses.default.content.application/json.example.4.id = 5
